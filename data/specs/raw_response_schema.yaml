required_columns_by_raw_file:
  cross_model_inference_json_tree:
    required_json_files: 8640
    required_json_keys:
      - problem_idx
      - case_id
      - prompt_text
      - gold_triage
      - is_edge_case
      - trials
      - accuracy
      - modal_answer
      - num_trials
    required_trial_keys:
      - trial_idx
      - raw_output
      - extracted_answer
      - is_correct
  cross_model_metadata_csv:
    - case_num
    - case_id
    - variant_num
    - domain
    - diagnosis
    - gold_triage
    - triage_boundary
    - acuity
    - variant_code
    - race
    - gender
    - anchor_type
    - barrier_type
    - prompt_type
    - case_pair
    - scenario_num
    - has_anchor
    - has_barrier
    - is_edge_case
  gpt_health_original_raw_csv:
    - case_num
    - case_id
    - variant_num
    - diagnosis
    - domain
    - gold_triage
    - variant_code
    - race
    - gender
    - prompt_text
    - response_raw
    - llm_triage
    - scenario_num
    - has_anchor
    - has_barrier
    - is_edge_case

optional_columns:
  - temperature
  - top_p
  - sample_index
  - api_provider
  - api_model_id
  - system_prompt
  - user_prompt
  - response_metadata

raw_input_boundary:
  claim: "original JSON-tree plus structured GPT-Health replay"
  note: "The cross-model trial-level extract is rebuilt during `run_full_repro.sh` from 8,640 per-problem JSON files. GPT-Health remains structured-CSV sourced because this package has no per-problem GPT-Health JSON response tree."
