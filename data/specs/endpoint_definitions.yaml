triage_ordinal_map:
  A: 1
  B: 2
  C: 3
  D: 4

endpoint_family:
  acceptable_floor_choice: posture
  floor_vs_ceiling_within_range_only: posture
  below_floor: failure
  outside_range: failure
  clean_harmful_undertriage: failure

endpoints:
  acceptable_floor_choice:
    definition: "1 when the gold range has a true floor/ceiling distinction and the predicted triage ordinal equals the lower acceptable bound."
    source_code: "src/02_build_afc_cell_table.py"
    role: "primary dense-posture proof-of-concept endpoint"
  floor_vs_ceiling_within_range_only:
    definition: "Posture comparator built only for complete surfaces where all 32 cells are within the acceptable triage range; label reuses acceptable_floor_choice."
    source_code: "src/04_denominator_and_eligibility.py"
    role: "adjacent posture comparator"
  below_floor:
    definition: "1 when predicted triage ordinal is below the lower acceptable bound."
    source_code: "src/02_build_afc_cell_table.py"
    role: "failure endpoint; not the retrospective POC claim"
  outside_range:
    definition: "1 when predicted triage ordinal is outside the acceptable range."
    source_code: "src/02_build_afc_cell_table.py"
    role: "failure endpoint; not the retrospective POC claim"
  clean_harmful_undertriage:
    definition: "Imported from clear_harmful_undertriage_positive_cells.csv and merged onto k=5 cells."
    source_code: "src/04_denominator_and_eligibility.py"
    role: "failure endpoint; not the retrospective POC claim"
